name: Build Firmware

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version string with v prefix (e.g. v0.1.0b)"
        required: true
        default: "v0.1.0b"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ESP-IDF setup and build
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp-idf-version: v5.4.4
          target: esp32s3

      - name: Package release
        run: python utils/make_release.py -v "${{ inputs.version }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rnode-halow-firmware
          path: |
            out/rnode_firmware_thalow.zip
            out/release.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: ${{ inputs.version }}
          prerelease: true
          files: |
            out/rnode_firmware_thalow.zip
            out/release.json
          generate_release_notes: true
